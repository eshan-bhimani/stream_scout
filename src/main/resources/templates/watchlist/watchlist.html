<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#060a12">
  <title>My watchlist • StreamScout</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="page">
  <div class="container">
    <header th:replace="~{fragments :: topbar}"></header>

    <section class="panel">
      <p class="eyebrow">Personal queue</p>
      <h1>My watchlist</h1>
      <p class="muted section-lead">Titles you’ve saved straight from JDBC — drag status forward as you binge, or remove what you’ll never revisit.</p>
    </section>

    <section class="panel panel-tight">
      <div th:if="${#lists.isEmpty(rows)}" class="muted">No saved titles yet. Head to the catalog and tap <strong>Add to watchlist</strong>.</div>

      <div class="watch-grid">
        <div class="watch-row" th:each="r : ${rows}">
          <div style="min-width:min(100%,260px);">
            <div class="watch-title">
              <a th:href="@{'/movies/' + ${r.movieId}}" th:text="${r.title}">Title</a>
            </div>
            <div class="muted" style="margin-top:6px;" th:text="${r.contentType + ' · ' + r.releaseYear + ' · status: ' + r.status}">Movie · 2021</div>
          </div>
          <div class="watch-controls">
            <form method="post" action="/watchlist/status" class="watch-controls-inline">
              <input type="hidden" name="id" th:value="${r.id}">
              <label style="margin:0;">
                <span class="muted" style="display:block; margin-bottom:6px;">Status</span>
                <select name="status">
                  <option value="PLANNED" th:selected="${r.status == 'PLANNED'}">Planned</option>
                  <option value="WATCHING" th:selected="${r.status == 'WATCHING'}">Watching</option>
                  <option value="COMPLETED" th:selected="${r.status == 'COMPLETED'}">Completed</option>
                  <option value="DROPPED" th:selected="${r.status == 'DROPPED'}">Dropped</option>
                </select>
              </label>
              <button class="btn primary btn-sm" type="submit" style="align-self:flex-end;">Save</button>
            </form>
            <form method="post" action="/watchlist/remove">
              <input type="hidden" name="id" th:value="${r.id}">
              <button class="btn danger btn-sm" type="submit">Remove</button>
            </form>
          </div>
        </div>
      </div>
    </section>
  </div>
  <footer th:replace="~{fragments :: footer}"></footer>
</div>
</body>
</html>
