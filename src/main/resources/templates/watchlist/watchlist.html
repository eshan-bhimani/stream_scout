<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>My watchlist • StreamScout</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<main class="container">
  <header class="topbar">
    <a class="brand" href="/">StreamScout</a>
    <nav class="nav">
      <a href="/movies">Browse</a>
      <a href="/platforms">Platforms</a>
      <a href="/watchlist">My watchlist</a>
      <a href="/auth/logout">Logout</a>
    </nav>
  </header>

  <section class="card">
    <h1>My watchlist</h1>
    <p class="muted">Update status or remove items. This page is generated entirely from database rows.</p>
  </section>

  <section class="card">
    <div th:if="${#lists.isEmpty(rows)}" class="muted">No items yet. Browse a title and add it to your watchlist.</div>

    <div th:each="r : ${rows}" style="padding:12px 0; border-top:1px solid rgba(255,255,255,0.10);">
      <div style="display:flex; justify-content:space-between; gap:12px; align-items:center;">
        <div style="min-width:0;">
          <div style="font-weight:800; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">
            <a th:href="@{'/movies/' + ${r.movieId}}" th:text="${r.title}">Title</a>
          </div>
          <div class="muted" th:text="${r.contentType + ' • ' + r.releaseYear + ' • ' + r.status}"></div>
        </div>
        <div style="display:flex; gap:10px; align-items:center; flex-wrap:wrap;">
          <form method="post" action="/watchlist/status" style="display:flex; gap:8px; align-items:center;">
            <input type="hidden" name="id" th:value="${r.id}">
            <select name="status">
              <option value="PLANNED" th:selected="${r.status == 'PLANNED'}">PLANNED</option>
              <option value="WATCHING" th:selected="${r.status == 'WATCHING'}">WATCHING</option>
              <option value="COMPLETED" th:selected="${r.status == 'COMPLETED'}">COMPLETED</option>
              <option value="DROPPED" th:selected="${r.status == 'DROPPED'}">DROPPED</option>
            </select>
            <button class="btn primary" type="submit">Update</button>
          </form>
          <form method="post" action="/watchlist/remove">
            <input type="hidden" name="id" th:value="${r.id}">
            <button class="btn danger" type="submit">Remove</button>
          </form>
        </div>
      </div>
    </div>
  </section>
</main>
</body>
</html>
