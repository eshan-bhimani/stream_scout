<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login • StreamScout</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <main class="container">
    <header class="topbar">
      <a class="brand" href="/">StreamScout</a>
      <nav class="nav">
        <a href="/movies">Browse</a>
        <a href="/platforms">Platforms</a>
        <a href="/auth/signup">Sign up</a>
      </nav>
    </header>

    <section class="card">
      <h1>Login</h1>
      <p class="muted">Use your StreamScout account to manage your watchlist and reviews.</p>

      <form method="post" action="/auth/login" class="form">
        <label>
          <span>Username</span>
          <input name="username" autocomplete="username" required>
        </label>
        <label>
          <span>Password</span>
          <input name="password" type="password" autocomplete="current-password" required>
        </label>

        <button class="btn primary" type="submit">Login</button>
      </form>

      <div class="notice">
        <div class="error" th:if="${param.error}">Invalid username or password.</div>
        <div class="ok" th:if="${param.signup}">Account created. Please log in.</div>
      </div>

      <p class="muted">No account? <a href="/auth/signup">Create one</a>.</p>
    </section>
  </main>
</body>
</html>
