<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#060a12">
  <title>Login • StreamScout</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="page">
  <div class="container">
    <header th:replace="~{fragments :: topbar}"></header>

    <div class="auth-panel">
      <section class="panel">
        <p class="eyebrow">Secure access</p>
        <h1>Welcome back</h1>
        <p class="muted section-lead">Sign in with your StreamScout account to unlock watchlists and reviews backed by JDBC + Spring Security.</p>

        <form method="post" action="/auth/login" class="form">
          <label>
            <span>Username</span>
            <input name="username" autocomplete="username" required>
          </label>
          <label>
            <span>Password</span>
            <input name="password" type="password" autocomplete="current-password" required>
          </label>
          <button class="btn primary btn-block" type="submit">Sign in</button>
        </form>

        <div class="notice">
          <div class="error" th:if="${param.error}">Those credentials didn’t match—try again.</div>
          <div class="ok" th:if="${param.signup}">Account ready. Sign in whenever you’d like.</div>
        </div>

        <div class="divider-soft"></div>
        <p class="muted auth-foot">Need an account? <a href="/auth/signup"><strong>Create one</strong></a></p>
      </section>
    </div>
  </div>
  <footer th:replace="~{fragments :: footer}"></footer>
</div>
</body>
</html>
