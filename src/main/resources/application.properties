server.port=${SERVER_PORT:9080}

# MySQL (docker-compose defaults)
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3307}/${DB_NAME:streamscout}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${DB_USER:streamscout}
spring.datasource.password=${DB_PASSWORD:streamscout}

spring.thymeleaf.cache=false

