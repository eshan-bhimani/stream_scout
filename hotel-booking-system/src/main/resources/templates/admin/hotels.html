<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Admin — Hotels</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<div th:replace="~{fragments :: nav}"></div>
<main>
    <a class="page-back" th:href="@{/admin}">&larr; Dashboard</a>
    <h1>Hotels</h1>
    <div th:if="${message}" class="flash flash-ok" th:text="${message}"></div>
    <p style="margin-bottom:1rem;"><a class="btn" th:href="@{/admin/hotels/edit}">Add hotel</a></p>
    <div class="panel" style="padding:0;overflow:hidden;" th:if="${!hotels.isEmpty()}">
        <div style="overflow-x:auto;">
            <table>
                <thead>
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Type</th>
                    <th>City</th>
                    <th></th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="h : ${hotels}">
                    <td th:text="${h.hotelId}"></td>
                    <td th:text="${h.hotelName}"></td>
                    <td th:text="${h.hotelType}"></td>
                    <td th:text="${h.city}"></td>
                    <td><a th:href="@{/admin/hotels/edit(id=${h.hotelId})}">Edit</a></td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</main>
</body>
</html>
