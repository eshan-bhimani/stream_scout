<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Admin — Room types</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<div th:replace="~{fragments :: nav}"></div>
<main>
    <a class="page-back" th:href="@{/admin}">&larr; Dashboard</a>
    <h1>Room types</h1>
    <div th:if="${message}" class="flash flash-ok" th:text="${message}"></div>
    <p style="margin-bottom:1rem;"><a class="btn" th:href="@{/admin/rooms/edit}">Add room type</a></p>
    <div class="panel" style="padding:0;overflow:hidden;" th:if="${!roomTypes.isEmpty()}">
        <div style="overflow-x:auto;">
            <table>
                <thead>
                <tr>
                    <th>ID</th>
                    <th>Hotel</th>
                    <th>Room</th>
                    <th>Price</th>
                    <th>Inventory</th>
                    <th></th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="r : ${roomTypes}">
                    <td th:text="${r.roomTypeId}"></td>
                    <td>
                        <span th:each="h : ${hotels}" th:if="${h.hotelId == r.hotelId}" th:text="${h.hotelName}">—</span>
                    </td>
                    <td th:text="${r.roomName}"></td>
                    <td th:text="${#numbers.formatDecimal(r.pricePerNight, 1, 2)}"></td>
                    <td th:text="${r.totalRooms}"></td>
                    <td><a th:href="@{/admin/rooms/edit(id=${r.roomTypeId})}">Edit</a></td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</main>
</body>
</html>
