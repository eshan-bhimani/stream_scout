<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Hotel form</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<div th:replace="~{fragments :: nav}"></div>
<main>
    <h1 th:text="${hotel.hotelId != null && hotel.hotelId > 0} ? 'Edit hotel' : 'New hotel'">Hotel</h1>
    <div class="panel" style="max-width:520px;">
        <form th:action="@{/admin/hotels/save}" method="post" th:object="${hotel}">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <input type="hidden" th:field="*{hotelId}"/>
            <div class="form-row">
                <label for="hotelName">Name</label>
                <input id="hotelName" type="text" th:field="*{hotelName}" required/>
            </div>
            <div class="form-row">
                <label for="hotelType">Type</label>
                <input id="hotelType" type="text" th:field="*{hotelType}" required placeholder="Resort / City"/>
            </div>
            <div class="form-row">
                <label for="city">City</label>
                <input id="city" type="text" th:field="*{city}"/>
            </div>
            <div class="form-row">
                <label for="countryCode">Country code</label>
                <input id="countryCode" type="text" th:field="*{countryCode}" maxlength="10"/>
            </div>
            <div class="form-row">
                <label for="description">Description</label>
                <textarea id="description" rows="4" th:field="*{description}"></textarea>
            </div>
            <button type="submit" class="btn">Save</button>
            <a class="btn btn-secondary" th:href="@{/admin/hotels}">Cancel</a>
        </form>
    </div>
</main>
</body>
</html>
