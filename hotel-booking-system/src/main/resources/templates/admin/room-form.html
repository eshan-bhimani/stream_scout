<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Room type form</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<div th:replace="~{fragments :: nav}"></div>
<main>
    <h1 th:text="${roomType.roomTypeId != null && roomType.roomTypeId > 0} ? 'Edit room type' : 'New room type'">Room</h1>
    <div class="panel" style="max-width:520px;">
        <form th:action="@{/admin/rooms/save}" method="post" th:object="${roomType}">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <input type="hidden" th:field="*{roomTypeId}"/>
            <div class="form-row">
                <label for="hotelId">Hotel</label>
                <select id="hotelId" th:field="*{hotelId}" required>
                    <option th:each="h : ${hotels}" th:value="${h.hotelId}" th:text="${h.hotelName}"></option>
                </select>
            </div>
            <div class="form-row">
                <label for="roomName">Room name</label>
                <input id="roomName" type="text" th:field="*{roomName}" required/>
            </div>
            <div class="form-row">
                <label for="maxAdults">Max adults</label>
                <input id="maxAdults" type="number" th:field="*{maxAdults}" min="1" required/>
            </div>
            <div class="form-row">
                <label for="maxChildren">Max children</label>
                <input id="maxChildren" type="number" th:field="*{maxChildren}" min="0" required/>
            </div>
            <div class="form-row">
                <label for="bedType">Bed type</label>
                <input id="bedType" type="text" th:field="*{bedType}"/>
            </div>
            <div class="form-row">
                <label for="pricePerNight">Price per night</label>
                <input id="pricePerNight" type="number" step="0.01" th:field="*{pricePerNight}" required/>
            </div>
            <div class="form-row">
                <label for="totalRooms">Total rooms (inventory)</label>
                <input id="totalRooms" type="number" th:field="*{totalRooms}" min="1" required/>
            </div>
            <button type="submit" class="btn">Save</button>
            <a class="btn btn-secondary" th:href="@{/admin/rooms}">Cancel</a>
        </form>
    </div>
</main>
</body>
</html>
