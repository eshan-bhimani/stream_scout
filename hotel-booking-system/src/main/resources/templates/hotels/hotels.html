<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Hotels</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<div th:replace="~{fragments :: nav}"></div>
<main>
    <h1>Hotels</h1>
    <p class="meta">Select a property to explore room types and nightly rates.</p>
    <div class="card-grid">
        <article class="card" th:each="h : ${hotels}">
            <h2 th:text="${h.hotelName}">Name</h2>
            <p class="meta" th:text="${h.hotelType + ' · ' + h.city + ', ' + h.countryCode}"></p>
            <p th:text="${h.description}"></p>
            <a class="btn" th:href="@{/hotels/{id}(id=${h.hotelId})}">Details</a>
        </article>
    </div>
</main>
</body>
</html>
