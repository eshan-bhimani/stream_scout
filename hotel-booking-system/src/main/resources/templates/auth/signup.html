<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Sign up</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<div th:replace="~{fragments :: nav}"></div>
<main>
    <div class="panel" style="max-width:420px;">
        <h2>Create account</h2>
        <div th:if="${error}" class="flash flash-error" th:text="${error}"></div>
        <form th:action="@{/signup}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <div class="form-row">
                <label for="fullName">Full name</label>
                <input id="fullName" type="text" name="fullName" required/>
            </div>
            <div class="form-row">
                <label for="email">Email</label>
                <input id="email" type="email" name="email" required autocomplete="email"/>
            </div>
            <div class="form-row">
                <label for="password">Password (min 6 characters)</label>
                <input id="password" type="password" name="password" required minlength="6" autocomplete="new-password"/>
            </div>
            <button type="submit" class="btn">Sign up</button>
        </form>
        <p style="margin-top:1rem;font-size:0.88rem;" class="meta">
            Already have an account? <a th:href="@{/login}">Log in</a>
        </p>
    </div>
</main>
</body>
</html>
