<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Log in</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<div th:replace="~{fragments :: nav}"></div>
<main>
    <div class="panel" style="max-width:420px;">
        <h2>Log in</h2>
        <div th:if="${param.error}" class="flash flash-error">Invalid email or password.</div>
        <div th:if="${message}" class="flash flash-ok" th:text="${message}"></div>
        <form th:action="@{/login}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <div class="form-row">
                <label for="email">Email</label>
                <input id="email" type="email" name="email" required autocomplete="username"/>
            </div>
            <div class="form-row">
                <label for="password">Password</label>
                <input id="password" type="password" name="password" required autocomplete="current-password"/>
            </div>
            <button type="submit" class="btn">Log in</button>
        </form>
        <p style="margin-top:1rem;font-size:0.88rem;" class="meta">
            No account? <a th:href="@{/signup}">Sign up</a>
        </p>
    </div>
</main>
</body>
</html>
