<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>
<header class="site-header" th:fragment="nav">
    <nav class="nav-inner">
        <a class="brand" th:href="@{/}">StayAnalytics</a>
        <div class="nav-links">
            <a th:href="@{/hotels}">Hotels</a>
            <th:block sec:authorize="isAuthenticated()">
                <a th:href="@{/bookings/my}">My bookings</a>
                <th:block sec:authorize="hasRole('ADMIN')">
                    <a th:href="@{/admin}">Admin</a>
                </th:block>
                <form class="inline-form" th:action="@{/logout}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <button type="submit" class="btn btn-secondary" style="padding:0.35rem 0.75rem;font-size:0.85rem;">Log out</button>
                </form>
            </th:block>
            <th:block sec:authorize="!isAuthenticated()">
                <a th:href="@{/login}">Log in</a>
                <a th:href="@{/signup}" class="btn" style="padding:0.35rem 0.75rem;font-size:0.85rem;">Sign up</a>
            </th:block>
        </div>
    </nav>
</header>
</body>
</html>
