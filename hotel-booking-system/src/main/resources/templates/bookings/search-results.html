<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Search results</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<div th:replace="~{fragments :: nav}"></div>
<main>
    <a class="page-back" th:href="@{/}">&larr; New search</a>
    <h1>Available rooms</h1>
    <p class="meta" th:if="${hotel != null}"
       th:text="${hotel.hotelName + ' · ' + #temporals.format(arrival, 'MMM d') + ' – ' + #temporals.format(checkout, 'MMM d, yyyy')}"></p>

    <div th:if="${error}" class="flash flash-error" th:text="${error}"></div>

    <div class="panel" style="padding:0;overflow:hidden;margin-top:1rem;" th:if="${!results.isEmpty()}">
        <div style="overflow-x:auto;">
            <table>
                <thead>
                <tr>
                    <th>Room</th>
                    <th>Capacity</th>
                    <th>Bed</th>
                    <th>Price / night</th>
                    <th>Available</th>
                    <th sec:authorize="isAuthenticated()">Book</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="r : ${results}">
                    <td th:text="${r.roomName}"></td>
                    <td th:text="${r.maxAdults + 'A / ' + r.maxChildren + 'C'}"></td>
                    <td th:text="${r.bedType}"></td>
                    <td th:text="${#numbers.formatDecimal(r.pricePerNight, 1, 2)}"></td>
                    <td>
                        <span th:if="${r.available}" class="badge badge-ok" th:text="${r.availableCount + ' left'}">OK</span>
                        <span th:unless="${r.available}" class="badge badge-warn">Sold out</span>
                    </td>
                    <td sec:authorize="isAuthenticated()">
                        <form th:if="${r.available}" th:action="@{/bookings}" method="post" style="display:inline;">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                            <input type="hidden" name="hotelId" th:value="${hotelId}"/>
                            <input type="hidden" name="roomTypeId" th:value="${r.roomTypeId}"/>
                            <input type="hidden" name="arrival" th:value="${arrival}"/>
                            <input type="hidden" name="checkout" th:value="${checkout}"/>
                            <input type="hidden" name="adults" value="2"/>
                            <input type="hidden" name="children" value="0"/>
                            <input type="hidden" name="babies" value="0"/>
                            <input type="hidden" name="mealPlan" value="BB"/>
                            <button type="submit" class="btn" style="padding:0.3rem 0.6rem;font-size:0.8rem;">Book</button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <p sec:authorize="!isAuthenticated()" class="flash flash-ok" style="margin-top:1rem;">
        <a th:href="@{/login}">Log in</a> to complete a booking.
    </p>

    <p class="empty" th:if="${results.isEmpty()}">No room types for this hotel.</p>
</main>
</body>
</html>
