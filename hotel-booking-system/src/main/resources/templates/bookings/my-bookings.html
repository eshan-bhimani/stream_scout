<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>My bookings</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<div th:replace="~{fragments :: nav}"></div>
<main>
    <h1>My bookings</h1>
    <div th:if="${message}" class="flash flash-ok" th:text="${message}"></div>
    <div th:if="${error}" class="flash flash-error" th:text="${error}"></div>

    <div class="panel" style="padding:0;overflow:hidden;" th:if="${!bookings.isEmpty()}">
        <div style="overflow-x:auto;">
            <table>
                <thead>
                <tr>
                    <th>ID</th>
                    <th>Hotel</th>
                    <th>Room</th>
                    <th>Stay</th>
                    <th>Status</th>
                    <th>ADR</th>
                    <th></th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="b : ${bookings}">
                    <td th:text="${b.bookingId}"></td>
                    <td th:text="${b.hotelName}"></td>
                    <td th:text="${b.roomName}"></td>
                    <td th:text="${#temporals.format(b.arrivalDate, 'yyyy-MM-dd') + ' → ' + #temporals.format(b.checkoutDate, 'yyyy-MM-dd')}"></td>
                    <td>
                        <span th:if="${b.canceled}" class="badge badge-warn">Canceled</span>
                        <span th:unless="${b.canceled}" class="badge badge-ok" th:text="${b.bookingStatus}">OK</span>
                    </td>
                    <td th:text="${b.adr != null ? #numbers.formatDecimal(b.adr, 1, 2) : '—'}"></td>
                    <td>
                        <a th:href="@{/bookings/{id}(id=${b.bookingId})}">View</a>
                        <th:block th:if="${!b.canceled}">
                            · <a th:href="@{/bookings/{id}/edit(id=${b.bookingId})}">Edit</a>
                            ·
                            <form class="inline-form" th:action="@{/bookings/{id}/cancel(id=${b.bookingId})}" method="post" style="display:inline;">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                <button type="submit" class="btn btn-danger" style="padding:0.2rem 0.5rem;font-size:0.72rem;">Cancel</button>
                            </form>
                        </th:block>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
    <p class="empty" th:if="${bookings.isEmpty()}">You have no bookings yet.</p>
</main>
</body>
</html>
