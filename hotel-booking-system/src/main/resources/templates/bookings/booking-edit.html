<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Edit booking</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<div th:replace="~{fragments :: nav}"></div>
<main>
    <h1>Edit booking #<span th:text="${booking.bookingId}">0</span></h1>
    <div th:if="${error}" class="flash flash-error" th:text="${error}"></div>

    <div class="panel" style="max-width:480px;">
        <form th:action="@{/bookings/{id}/update(id=${booking.bookingId})}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <div class="form-row">
                <label for="arrival">Arrival</label>
                <input id="arrival" type="date" name="arrival" required th:value="${#temporals.format(booking.arrivalDate, 'yyyy-MM-dd')}"/>
            </div>
            <div class="form-row">
                <label for="checkout">Checkout</label>
                <input id="checkout" type="date" name="checkout" required th:value="${#temporals.format(booking.checkoutDate, 'yyyy-MM-dd')}"/>
            </div>
            <div class="form-row">
                <label for="adults">Adults</label>
                <input id="adults" type="number" name="adults" min="1" th:value="${booking.adults}"/>
            </div>
            <div class="form-row">
                <label for="children">Children</label>
                <input id="children" type="number" name="children" min="0" th:value="${booking.children}"/>
            </div>
            <div class="form-row">
                <label for="babies">Babies</label>
                <input id="babies" type="number" name="babies" min="0" th:value="${booking.babies}"/>
            </div>
            <div class="form-row">
                <label for="mealPlan">Meal plan</label>
                <select id="mealPlan" name="mealPlan">
                    <option value="BB" th:selected="${booking.mealPlan == 'BB'}">Bed &amp; breakfast</option>
                    <option value="HB" th:selected="${booking.mealPlan == 'HB'}">Half board</option>
                    <option value="FB" th:selected="${booking.mealPlan == 'FB'}">Full board</option>
                    <option value="SC" th:selected="${booking.mealPlan == 'SC'}">Self catering</option>
                </select>
            </div>
            <button type="submit" class="btn">Save changes</button>
            <a class="btn btn-secondary" th:href="@{/bookings/{id}(id=${booking.bookingId})}" style="margin-left:0.5rem;">Cancel</a>
        </form>
    </div>
</main>
</body>
</html>
